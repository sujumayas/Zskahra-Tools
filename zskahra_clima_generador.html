<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zskahra — Oráculo de Clima</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0D0D1A;
    font-family: 'Georgia', 'Times New Roman', serif;
    color: #E8E0D0;
    overflow-x: hidden;
  }

  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, #1A1A3E 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, #1A0D2E 0%, transparent 50%),
      #0D0D1A;
  }

  .orbe {
    position: fixed; top: -80px; right: -80px;
    width: 280px; height: 280px; border-radius: 50%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(circle at 40% 40%, rgba(74,144,217,0.15), rgba(74,144,217,0.03) 60%, transparent);
    box-shadow: 0 0 80px rgba(74,144,217,0.1);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 700px; margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* CABECERA */
  .header { text-align: center; margin-bottom: 48px; }
  .header-label {
    font-size: 11px; letter-spacing: 4px; color: #4A90D9;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .header h1 {
    font-size: clamp(32px, 6vw, 52px); font-weight: normal;
    letter-spacing: 6px; color: #E8E0D0;
    text-shadow: 0 0 40px rgba(74,144,217,0.3);
    margin-bottom: 8px;
  }
  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #4A90D9, transparent);
    margin: 0 auto 16px;
  }
  .header p { font-size: 13px; color: #8A8070; letter-spacing: 1px; }

  /* PANEL INPUT */
  .panel {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 32px; margin-bottom: 24px;
    backdrop-filter: blur(10px);
  }

  .input-label {
    display: block; font-size: 11px; letter-spacing: 3px;
    color: #4A90D9; text-transform: uppercase; margin-bottom: 12px;
  }

  .input-row { display: flex; gap: 12px; align-items: stretch; margin-bottom: 20px; }

  #khar-input {
    flex: 1; padding: 14px 18px; font-size: 20px;
    font-family: inherit; letter-spacing: 2px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; color: #E8E0D0; outline: none;
    transition: border-color 0.2s;
  }
  #khar-input:focus { border-color: #4A90D9; }
  #khar-input::-webkit-inner-spin-button,
  #khar-input::-webkit-outer-spin-button { opacity: 0.3; }

  #btn-tirar {
    padding: 14px 28px; font-size: 13px; letter-spacing: 2px;
    font-family: inherit; text-transform: uppercase;
    background: rgba(255,255,255,0.05);
    border: none; border-radius: 10px;
    color: #555; cursor: not-allowed;
    transition: all 0.2s; white-space: nowrap;
  }
  #btn-tirar.active {
    background: linear-gradient(135deg, #4A90D9, #3570B0);
    color: #fff; cursor: pointer;
  }
  #btn-tirar.active:hover { opacity: 0.85; }

  /* CHIPS */
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; min-height: 32px; }
  .chip {
    padding: 6px 12px; border-radius: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    font-size: 11px; letter-spacing: 0.5px;
  }
  .chip span.val { font-weight: bold; }

  /* TOGGLE */
  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-btn {
    width: 36px; height: 20px; border-radius: 10px; border: none;
    background: rgba(255,255,255,0.1); cursor: pointer;
    position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .toggle-btn.on { background: #4A90D9; }
  .toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; transition: left 0.2s;
  }
  .toggle-btn.on .toggle-knob { left: 18px; }
  .toggle-label { font-size: 11px; color: #666; letter-spacing: 1px; }

  /* LOADING */
  #loading {
    display: none; text-align: center;
    padding: 60px; color: #4A90D9;
    font-size: 24px; letter-spacing: 8px;
    animation: pulse 0.8s ease infinite alternate;
  }
  @keyframes pulse { from { opacity: 0.3; } to { opacity: 1; } }

  /* RESULTADO */
  #resultado { display: none; border-radius: 16px; padding: 32px; margin-bottom: 24px; }
  #resultado.visible { display: block; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .res-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .res-est-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; }
  .res-meta { font-size: 11px; color: #555; letter-spacing: 1px; }
  .res-dado { text-align: right; }
  .res-dado-label { font-size: 11px; letter-spacing: 2px; color: #555; margin-bottom: 2px; }
  .res-dado-num { font-size: 28px; font-weight: bold; line-height: 1; }
  .res-dado-mod { font-size: 13px; color: #D4A017; margin-left: 6px; }

  .res-nombre {
    font-size: clamp(20px, 4vw, 28px); font-weight: normal;
    letter-spacing: 1px; color: #E8E0D0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .badge-raro {
    font-size: 10px; letter-spacing: 2px; padding: 3px 10px;
    background: rgba(191,54,12,0.2); border: 1px solid rgba(191,54,12,0.4);
    border-radius: 20px; color: #FF7043; text-transform: uppercase;
  }

  .res-desc {
    font-size: 15px; line-height: 1.7; color: #B0A898;
    margin-bottom: 20px; font-style: italic;
  }

  .res-efecto {
    background: rgba(0,0,0,0.3); border-radius: 10px; padding: 16px 20px;
  }
  .res-efecto-label {
    font-size: 10px; letter-spacing: 3px; color: #555;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .res-efecto-texto { font-size: 14px; color: #D0C8B8; line-height: 1.6; }
  .res-rango { margin-top: 16px; font-size: 11px; color: #444; text-align: right; }

  /* HISTORIAL */
  #historial-panel {
    display: none; background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 20px; margin-bottom: 24px;
  }
  #historial-panel.visible { display: block; }
  .hist-label { font-size: 10px; letter-spacing: 3px; color: #444; text-transform: uppercase; margin-bottom: 14px; }
  .hist-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; border-radius: 8px;
    background: rgba(255,255,255,0.02);
    margin-bottom: 6px; flex-wrap: wrap; gap: 4px;
  }
  .hist-nombre { font-size: 12px; }
  .hist-dado { font-size: 11px; color: #444; }

  /* LEYENDA */
  .leyenda { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 32px; }
  .leyenda-chip {
    padding: 4px 12px; border-radius: 20px;
    font-size: 10px; letter-spacing: 0.5px;
  }
  .leyenda-rango { color: #666; margin: 0 4px; }
  .leyenda-nombre { color: #888; }
</style>
</head>

  <!-- RESULTADO -->

  <!-- HISTORIAL -->
  <div id="historial-panel">

    <div id="historial-lista"></div>

  <!-- LEYENDA -->

</div>

// ── HELPERS ───────────────────────────────────────────────────────────────────
function getEstacion(t) { return ESTACIONES.find(e => t >= e.inicio && t <= e.fin); }
function getCiclo(t)    { return Math.ceil(t / 32); }
function getPulso(t)    { return Math.floor(((t - 1) % 32) / 8) + 1; }
function esDiaPulso(t)  { return t % 8 === 0; }

function getClima(t, mod) {
  const roll    = Math.floor(Math.random() * 100) + 1;
  const rollMod = Math.min(100, Math.max(1, roll + mod));
  const est     = getEstacion(t);
  const tabla   = TABLAS[est.nombre];
  const item    = tabla.find(x => rollMod >= x.r[0] && rollMod <= x.r[1]);
  return { roll, rollMod, mod, item, est };
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
let modPulsoActivo = true;
let historial = [];

// ── LEYENDA ───────────────────────────────────────────────────────────────────
const leyendaEl = document.getElementById('leyenda');
ESTACIONES.forEach(e => {
  const chip = document.createElement('div');
  chip.className = 'leyenda-chip';
  chip.style.background = e.color + '15';
  chip.style.border = `1px solid ${e.color}40`;
  chip.innerHTML = `<span>${e.emoji}</span><span class="leyenda-rango">${e.inicio}–${e.fin}</span><span class="leyenda-nombre">${e.nombre}</span>`;
  leyendaEl.appendChild(chip);
});

// ── INPUT ─────────────────────────────────────────────────────────────────────
const inputEl  = document.getElementById('khar-input');
const btnEl    = document.getElementById('btn-tirar');
const chipsEl  = document.getElementById('chips');
const toggleEl = document.getElementById('toggle-pulso');

toggleEl.addEventListener('click', () => {
  modPulsoActivo = !modPulsoActivo;
  toggleEl.classList.toggle('on', modPulsoActivo);
  actualizarChips();
});

inputEl.addEventListener('input', actualizarChips);
inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') tirar(); });
btnEl.addEventListener('click', tirar);

function actualizarChips() {
  const t = parseInt(inputEl.value);
  chipsEl.innerHTML = '';
  if (!t || t < 1 || t > 288) {
    btnEl.classList.remove('active');
    return;
  }
  btnEl.classList.add('active');

  const est    = getEstacion(t);
  const ciclo  = getCiclo(t);
  const pulso  = getPulso(t);
  const esPulso = esDiaPulso(t);

  const chips = [
    { label: 'Estación', val: `${est.emoji} ${est.nombre}`, color: est.color },
    { label: 'Ciclo',    val: `${ciclo} de 9` },
    { label: 'Pulso',    val: `${pulso} del ciclo` },
    ...(esPulso ? [{ label: '★ Pulso Gemelo', val: modPulsoActivo ? '+10 al d100' : 'activo (mod. desactivado)', color: '#D4A017' }] : []),
  ];

  chips.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip';
    if (c.color) el.style.borderColor = c.color;
    el.innerHTML = `<span style="color:#666;margin-right:6px">${c.label}</span><span class="val" style="color:${c.color || '#E8E0D0'}">${c.val}</span>`;
    chipsEl.appendChild(el);
  });
}

// ── TIRAR ─────────────────────────────────────────────────────────────────────
function tirar() {
  const t = parseInt(inputEl.value);
  if (!t || t < 1 || t > 288) return;

  const loadingEl   = document.getElementById('loading');
  const resultadoEl = document.getElementById('resultado');

  loadingEl.style.display = 'block';
  resultadoEl.className   = '';
  resultadoEl.style.display = 'none';

  setTimeout(() => {
    const esPulso = esDiaPulso(t);
    const mod     = (modPulsoActivo && esPulso) ? 10 : 0;
    const res     = getClima(t, mod);

    loadingEl.style.display = 'none';
    renderResultado(res, t);

    historial.unshift({ turno: t, ...res });
    if (historial.length > 5) historial.pop();
    renderHistorial();
  }, 380);
}

function renderResultado(res, t) {
  const el  = document.getElementById('resultado');
  const est = res.est;
  const ciclo = getCiclo(t);
  const pulso = getPulso(t);

  el.style.cssText = `
    display:block;
    background: linear-gradient(135deg, ${est.bg}15, ${est.bg}08);
    border: 1px solid ${est.color}40;
    border-radius:16px; padding:32px; margin-bottom:24px;
  `;

  const modStr = res.mod !== 0
    ? `<span class="res-dado-mod">(${res.roll}${res.mod > 0 ? '+' : ''}${res.mod})</span>`
    : '';

  const raroStr = res.item.raro
    ? `<span class="badge-raro">Raro</span>`
    : '';

  el.innerHTML = `
    <div class="res-top">
      <div>
        <div class="res-est-label" style="color:${est.color}">${est.emoji} ${est.nombre}</div>
        <div class="res-meta">Khar ${t} · Ciclo ${ciclo} · Pulso ${pulso}</div>
      </div>
      <div class="res-dado">
        <div class="res-dado-label">d100</div>
        <div class="res-dado-num" style="color:${est.color}">${res.rollMod}${modStr}</div>
      </div>
    </div>
    <div class="res-nombre">
      ${res.item.nombre} ${raroStr}
    </div>
    <p class="res-desc">${res.item.desc}</p>
    <div class="res-efecto" style="border-left:3px solid ${est.color}">
      <div class="res-efecto-label">Efecto en juego</div>
      <div class="res-efecto-texto">${res.item.efecto}</div>
    </div>
    <div class="res-rango">Rango: ${res.item.r[0]}–${res.item.r[1]}</div>
  `;

  el.className = 'visible';
}

function renderHistorial() {
  const panel = document.getElementById('historial-panel');
  const lista  = document.getElementById('historial-lista');

  const anteriores = historial.slice(1);
  if (anteriores.length === 0) {
    panel.className = '';
    return;
  }

  panel.className = 'visible';
  lista.innerHTML = '';

  anteriores.forEach((h, i) => {
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.style.opacity = 1 - i * 0.25;
    div.innerHTML = `
      <div class="hist-nombre">
        <span style="color:${h.est.color};margin-right:8px">${h.est.emoji} Khar ${h.turno}</span>
        <span style="color:#B0A898">${h.item.nombre}</span>
      </div>
      <span class="hist-dado">d100: ${h.rollMod}</span>
    `;
    lista.appendChild(div);
  });
}
</script>
