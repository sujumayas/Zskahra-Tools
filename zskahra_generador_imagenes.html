<style>
:root{--bg:#110e08;--surface:#1e1608;--surface2:#2a1e0a;--border:#4a3418;--border-light:#6a4d28;--gold:#c8a045;--gold-dim:#8a6a2a;--cream:#e8d5a0;--cream-dim:#a08850;--prompt-bg:#0a0805;--red-dim:#8a3020}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'Crimson Text',Georgia,serif;font-size:17px;line-height:1.5;min-height:100vh}
.back-link{display:block;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;transition:color .15s}
.back-link:hover{color:var(--gold)}
header{background:var(--surface);border-bottom:2px solid var(--gold);padding:20px 16px 14px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-family:'Cinzel',serif;font-size:22px;font-weight:800;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
header p{font-size:13px;color:var(--cream-dim);margin-top:3px;font-style:italic}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{flex:1;padding:12px;text-align:center;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--cream-dim);cursor:pointer;border:none;background:none;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
main{padding:16px;max-width:700px;margin:0 auto}
section{display:none}
section.active{display:block}
.section-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.race-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.race-btn{padding:14px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--cream-dim);font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center}
.race-btn:hover{border-color:var(--gold-dim);color:var(--cream)}
.race-btn.active{background:#2a1e00;border-color:var(--gold);color:var(--gold)}
.race-sub{font-size:11px;color:var(--cream-dim);display:block;margin-top:4px;font-family:'Crimson Text',serif;font-style:italic;letter-spacing:0}
.form-grid{display:grid;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase}
select,input[type=text],textarea{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--cream);font-family:'Crimson Text',serif;font-size:16px;padding:9px 10px;width:100%;appearance:none;-webkit-appearance:none;outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--gold-dim)}
select option,select optgroup{background:#1e1608}
textarea{resize:vertical;min-height:70px}
.toggle-group{display:flex;flex-wrap:wrap;gap:6px}
.toggle-btn{padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);font-family:'Crimson Text',serif;font-size:15px;cursor:pointer;transition:all .15s}
.toggle-btn.active{background:#2a1800;border-color:var(--gold);color:var(--gold)}
.suffix-note{font-size:13px;color:var(--cream-dim);font-style:italic;padding:8px 10px;background:var(--surface);border-left:2px solid var(--gold-dim);border-radius:2px;margin-top:4px}
.suffix-note.mark{border-left-color:var(--red-dim);color:#c88060}
.traits-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;margin-top:4px}
.trait-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.trait-row:last-child{border-bottom:none}
.trait-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;min-width:80px;padding-top:2px;flex-shrink:0}
.trait-value{font-size:14px;color:var(--cream);flex:1;font-style:italic}
.reroll-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);padding:3px 8px;font-size:13px;cursor:pointer;flex-shrink:0;transition:all .15s}
.reroll-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.reroll-all{width:100%;margin-top:10px;padding:8px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.reroll-all:hover{border-color:var(--gold-dim);color:var(--cream)}
.prompt-container{margin-top:20px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.prompt-header{background:var(--surface2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.prompt-header span{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase}
.prompt-text{background:var(--prompt-bg);padding:14px;font-family:'Courier Prime',monospace;font-size:12px;line-height:1.7;color:#b8a878;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto}
.btn{flex:1;padding:12px;border:none;border-radius:4px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-primary{background:var(--gold);color:#0a0805;font-weight:600}
.btn-primary:hover{background:#dab855}
.btn-secondary{background:var(--surface2);color:var(--cream);border:1px solid var(--border-light)}
.btn-secondary:hover{border-color:var(--gold-dim)}
.save-row{display:flex;gap:8px;margin-top:12px;align-items:flex-end}
.save-row .field{flex:1;margin:0}
.save-row .btn{flex:0 0 auto;padding:9px 16px}
.char-list{display:flex;flex-direction:column;gap:8px}
.char-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.char-card:hover{border-color:var(--gold-dim)}
.char-info h3{font-family:'Cinzel',serif;font-size:14px;color:var(--cream);font-weight:600}
.char-info p{font-size:13px;color:var(--cream-dim);margin-top:2px;font-style:italic}
.char-actions{display:flex;gap:6px}
.char-btn{padding:6px 10px;border-radius:3px;font-size:12px;cursor:pointer;border:1px solid;font-family:'Cinzel',serif;letter-spacing:.5px;transition:all .15s}
.char-btn-load{background:#1a1400;color:var(--gold);border-color:var(--gold-dim)}
.char-btn-del{background:#1a0500;color:#c85040;border-color:#5a1a10}
.empty-state{text-align:center;padding:40px 20px;color:var(--cream-dim);font-style:italic}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#0a0805;padding:10px 20px;border-radius:4px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:20px 0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
</style>
</head>

<header>
  <h1>Zskahra</h1>
  <p>Generador de imágenes de personaje</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('crear')">Crear</button>
  <button class="tab" onclick="switchTab('guardados')">Guardados</button>
</div>
<main>
  <section id="tab-crear" class="active">
    <div class="section-title">Origen</div>
    <div class="race-grid">
      <button class="race-btn active" onclick="setRace('aldeano',this)">Aldeano/a<span class="race-sub">Nacido en las villas</span></button>
      <button class="race-btn" onclick="setRace('mellizo',this)">Mellizo/a<span class="race-sub">Criado en las villas</span></button>
    </div>
    <div id="form-container"></div>
    <div class="divider"></div>
    <div class="prompt-container">
      <div class="prompt-header">
        <span>Prompt generado</span>
        <button class="btn btn-primary" style="flex:0;padding:6px 14px;font-size:11px;" onclick="copyPrompt()">Copiar</button>
      </div>
      <div class="prompt-text" id="prompt-output">Selecciona un origen...</div>
    </div>
    <div class="save-row">
      <div class="field"><label>Nombre</label><input type="text" id="char-name" placeholder="Nombre del personaje..."></div>
      <button class="btn btn-secondary" onclick="saveCharacter()">Guardar</button>
    </div>
  </section>
  <section id="tab-guardados">
    <div class="section-title">Personajes guardados</div>
    <div class="char-list" id="char-list"><div class="empty-state">No hay personajes guardados aún.</div></div>
  </section>
</main>

  '-tav (árbitro)':'Media disputas, arbitra entre familias. En villas pequeñas, los -tav son la ley viva.',
  '-kron (líder)':'Cabeza de villa. Solo uno por villa.',
  '-kel (vacío)':'Sufrió una pérdida irreparable reconocida públicamente. Licencia social para el duelo.',
  '-vran (desastre)':'Sobrevivió un evento catastrófico colectivo siendo joven. Testigo vivo.',
  '-nak (destierro)':'Expulsado y readmitido, o carga culpa pública no resuelta. Estigma social.',
  '-khrav (Caos tocado)':'Visiblemente tocado por el Caos. El sufijo-advertencia. Vigilado, a veces apartado.',
  '-ior (viajero)':'Cruzó fuera de su villa al menos una vez y regresó. Sabe cosas que ningún archivista guarda.',
  'aprendiz sin sufijo':'Aún no cruzó ningún hito reconocido públicamente.'
};

const suffixIsHerida=['-kel (vacío)','-vran (desastre)','-nak (destierro)','-khrav (Caos tocado)'];

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}
function rollAll(role){
  const s=profScars[role]||profScars['aprendiz sin sufijo'];
  randomTraits={
    face:pick(faceBank)+', '+pick(noseBank)+'. '+pick(browBank)+'.',
    scar:pick(s),
    wild:pick(wildBank)
  };
  renderTraits();updatePrompt();
}
function rollOne(key,role){
  if(key==='face')randomTraits.face=pick(faceBank)+', '+pick(noseBank)+'. '+pick(browBank)+'.';
  if(key==='scar'){const s=profScars[role]||profScars['aprendiz sin sufijo'];randomTraits.scar=pick(s);}
  if(key==='wild')randomTraits.wild=pick(wildBank);
  renderTraits();updatePrompt();
}
function renderTraits(){
  const box=document.getElementById('traits-display');
  if(!box)return;
  const role=currentData.role||'aprendiz sin sufijo';
  box.innerHTML=`
    <div class="trait-row">
      <span class="trait-label">Cara</span>
      <span class="trait-value">${randomTraits.face}</span>
      <button class="reroll-btn" onclick="rollOne('face','${role.replace(/'/g,"\\'")}')">🎲</button>
    </div>
    <div class="trait-row">
      <span class="trait-label">Marca</span>
      <span class="trait-value">${randomTraits.scar}</span>
      <button class="reroll-btn" onclick="rollOne('scar','${role.replace(/'/g,"\\'")}')">🎲</button>
    </div>
    <div class="trait-row">
      <span class="trait-label">Distintivo</span>
      <span class="trait-value">${randomTraits.wild}</span>
      <button class="reroll-btn" onclick="rollOne('wild','${role.replace(/'/g,"\\'")}')">🎲</button>
    </div>
    <button class="reroll-all" onclick="rollAll('${role.replace(/'/g,"\\'")}')">🎲 Reroll todo</button>
  `;
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['crear','guardados'][i]===tab));
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='guardados')renderSaved();
}
function setRace(race,btn){
  currentRace=race;
  document.querySelectorAll('.race-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderForm();updatePrompt();
}

function buildSuffixSelect(){
  const groups=[
    {label:'Supervivencia',opts:['-dren (primer Caos)','-mork (cazador)','-ruk (superviviente)','-skar (defensor)']},
    {label:'Linaje',opts:['-thar (unión)','-neth (padre/madre)','-velar (tronco)']},
    {label:'Conocimiento y cuidado',opts:['-val (artesano)','-sar (archivista)','-ion (sanador)','-mir (cuidador)','-oth (vidente)','-veth (rito)']},
    {label:'Autoridad y justicia',opts:['-held (guardián)','-tav (árbitro)','-kron (líder)']},
    {label:'Heridas y marcas',opts:['-kel (vacío)','-vran (desastre)','-nak (destierro)','-khrav (Caos tocado)']},
    {label:'Movilidad',opts:['-ior (viajero)']},
    {label:'Sin sufijo',opts:['aprendiz sin sufijo']}
  ];
  let html='<select onchange="onRoleChange(this.value)">';
  groups.forEach(g=>{
    html+=`<optgroup label="${g.label}">`;
    g.opts.forEach(o=>html+=`<option value="${o}"${o==='-ion (sanador)'?' selected':''}>${o}</option>`);
    html+='</optgroup>';
  });
  return html+'</select>';
}

function renderForm(){
  const c=document.getElementById('form-container');
  c.innerHTML=currentRace==='mellizo'?getMellizoHTML():getAldHTML();
  currentData={};
  c.querySelectorAll('.toggle-btn.active').forEach(b=>{currentData[b.dataset.field]=b.dataset.val});
  c.querySelectorAll('select').forEach(s=>{
    const m=s.getAttribute('onchange')?.match(/'([^']+)'/);
    if(m)currentData[m[1]]=s.value;
  });
  if(currentRace==='aldeano'){
    currentData.role='-ion (sanador)';
    updateSuffixNote('-ion (sanador)');
  }
  rollAll(currentData.role||'aprendiz sin sufijo');
}

function onRoleChange(val){
  currentData.role=val;
  updateSuffixNote(val);
  rollAll(val);
  updatePrompt();
}

function updateSuffixNote(role){
  const el=document.getElementById('suffix-note');
  if(!el)return;
  const desc=suffixDesc[role]||'';
  const isHerida=suffixIsHerida.includes(role);
  el.className='suffix-note'+(isHerida?' mark':'');
  el.textContent=desc;
}

  btn.classList.add('active');
  currentData[f]=btn.dataset.val;
  updatePrompt();
}
function setVal(f,v){currentData[f]=v;updatePrompt();}

  const beard=d.gender==='male'?'\nNo beard or very light stubble.':'';

    ?'skin tone scale 2 out of 10 — very light grey tint, barely perceptible, still nearly white.'
    :'skin tone scale 1 out of 10 — near-white, minimal hatching, almost no shadow on skin surface.';
  const faceNote=profFaceNotes[d.role]||'';
  const props=roleProps[d.role]||'Simple draped linen garments, earth tones.';
  return `Full-body illustration, antique manuscript style, sepia ink line drawing on aged parchment, detailed hatching, no color except warm yellowed paper background.
NO TEXT, NO LABELS, NO WRITING anywhere.

Subject: a ${d.age} ${d.gender==='male'?'man':'woman'}, Aldeano from ${d.village||'a village'}, suffix: ${d.role}.

function updatePrompt(){
  let p='';
  try{
    if(currentRace==='aldeano')p=buildAldeano(currentData);
    else p=buildMellizo(currentData);
  }catch(e){p='Error generando prompt.'}
  document.getElementById('prompt-output').textContent=p;
}
function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('prompt-output').textContent).then(()=>showToast('Prompt copiado'));
}

async function saveCharacter(){
  const name=document.getElementById('char-name').value.trim();
  if(!name){showToast('Escribe un nombre primero');return}
  const char={id:Date.now().toString(),name,race:currentRace,data:{...currentData},traits:{...randomTraits},saved:new Date().toLocaleDateString('es')};
  let chars=[];
  try{const r=await window.storage.get('zskahra-player-chars');if(r)chars=JSON.parse(r.value)}catch(e){}
  chars.unshift(char);
  await window.storage.set('zskahra-player-chars',JSON.stringify(chars));
  document.getElementById('char-name').value='';
  showToast(`"${name}" guardado`);
}
async function renderSaved(){
  const list=document.getElementById('char-list');
  let chars=[];
  try{const r=await window.storage.get('zskahra-player-chars');if(r)chars=JSON.parse(r.value)}catch(e){}
  if(!chars.length){list.innerHTML='<div class="empty-state">No hay personajes guardados aún.</div>';return}
  list.innerHTML=chars.map(c=>`<div class="char-card"><div class="char-info"><h3>${c.name}</h3><p>${c.race==='aldeano'?'Aldeano/a':'Mellizo/a'} · ${c.data?.role||''} · ${c.saved||''}</p></div><div class="char-actions"><button class="char-btn char-btn-load" onclick="loadChar('${c.id}')">Cargar</button><button class="char-btn char-btn-del" onclick="deleteChar('${c.id}')">✕</button></div></div>`).join('');
}
async function loadChar(id){
  let chars=[];
  try{const r=await window.storage.get('zskahra-player-chars');if(r)chars=JSON.parse(r.value)}catch(e){}
  const char=chars.find(c=>c.id===id);if(!char)return;
  switchTab('crear');
  currentRace=char.race;
  document.querySelectorAll('.race-btn').forEach((b,i)=>b.classList.toggle('active',['aldeano','mellizo'][i]===char.race));
  currentData={...char.data};
  if(char.traits)randomTraits={...char.traits};
  renderForm();
  setTimeout(()=>{
    document.querySelectorAll('.toggle-btn').forEach(b=>{
      if(b.dataset.field&&currentData[b.dataset.field]===b.dataset.val){
        b.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
      }
    });
    document.querySelectorAll('select').forEach(s=>{
      const m=s.getAttribute('onchange')?.match(/'([^']+)'/);
      if(m&&currentData[m[1]])s.value=currentData[m[1]];
    });
    if(char.traits){randomTraits={...char.traits};renderTraits();}
    updateSuffixNote(currentData.role||'aprendiz sin sufijo');
    updatePrompt();
  },60);
  document.getElementById('char-name').value=char.name;
  showToast(`"${char.name}" cargado`);
}
async function deleteChar(id){
  let chars=[];
  try{const r=await window.storage.get('zskahra-player-chars');if(r)chars=JSON.parse(r.value)}catch(e){}
  chars=chars.filter(c=>c.id!==id);
  await window.storage.set('zskahra-player-chars',JSON.stringify(chars));
  renderSaved();showToast('Personaje eliminado');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
renderForm();
</script>
