<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zskahra — Generador de Imágenes</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#110e08;--surface:#1e1608;--surface2:#2a1e0a;--border:#4a3418;--border-light:#6a4d28;--gold:#c8a045;--gold-dim:#8a6a2a;--cream:#e8d5a0;--cream-dim:#a08850;--prompt-bg:#0a0805}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--cream);font-family:'Crimson Text',Georgia,serif;font-size:17px;line-height:1.5;min-height:100vh}
.back-link{display:block;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-dim);text-decoration:none;text-transform:uppercase;transition:color .15s}
.back-link:hover{color:var(--gold)}
header{background:var(--surface);border-bottom:2px solid var(--gold);padding:20px 16px 14px;text-align:center;position:sticky;top:0;z-index:100}
header h1{font-family:'Cinzel',serif;font-size:22px;font-weight:800;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
header p{font-size:13px;color:var(--cream-dim);margin-top:3px;font-style:italic}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.tab{flex:1;padding:12px;text-align:center;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;color:var(--cream-dim);cursor:pointer;border:none;background:none;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
main{padding:16px;max-width:700px;margin:0 auto}
section{display:none}
section.active{display:block}
.section-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.race-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.race-btn{padding:14px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--cream-dim);font-family:'Cinzel',serif;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-align:center}
.race-btn:hover{border-color:var(--gold-dim);color:var(--cream)}
.race-btn.active{background:#2a1e00;border-color:var(--gold);color:var(--gold)}
.race-sub{font-size:11px;color:var(--cream-dim);display:block;margin-top:4px;font-family:'Crimson Text',serif;font-style:italic;letter-spacing:0}
.form-grid{display:grid;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase}
select,input[type=text],textarea{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--cream);font-family:'Crimson Text',serif;font-size:16px;padding:9px 10px;width:100%;appearance:none;-webkit-appearance:none;outline:none;transition:border-color .2s}
select:focus,input:focus,textarea:focus{border-color:var(--gold-dim)}
select option{background:#1e1608}
textarea{resize:vertical;min-height:70px}
.toggle-group{display:flex;flex-wrap:wrap;gap:6px}
.toggle-btn{padding:7px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);font-family:'Crimson Text',serif;font-size:15px;cursor:pointer;transition:all .15s}
.toggle-btn.active{background:#2a1800;border-color:var(--gold);color:var(--gold)}
/* RANDOM TRAITS */
.traits-box{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px;margin-top:4px}
.trait-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.trait-row:last-child{border-bottom:none}
.trait-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--gold-dim);text-transform:uppercase;min-width:80px;padding-top:2px;flex-shrink:0}
.trait-value{font-size:14px;color:var(--cream);flex:1;font-style:italic}
.reroll-btn{background:none;border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);padding:3px 8px;font-size:13px;cursor:pointer;flex-shrink:0;transition:all .15s}
.reroll-btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.reroll-all{width:100%;margin-top:10px;padding:8px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--cream-dim);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.reroll-all:hover{border-color:var(--gold-dim);color:var(--cream)}
/* PROMPT */
.prompt-container{margin-top:20px;border:1px solid var(--border);border-radius:4px;overflow:hidden}
.prompt-header{background:var(--surface2);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.prompt-header span{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold-dim);text-transform:uppercase}
.prompt-text{background:var(--prompt-bg);padding:14px;font-family:'Courier Prime',monospace;font-size:12px;line-height:1.7;color:#b8a878;white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto}
.btn{flex:1;padding:12px;border:none;border-radius:4px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .2s;text-transform:uppercase}
.btn-primary{background:var(--gold);color:#0a0805;font-weight:600}
.btn-primary:hover{background:#dab855}
.btn-secondary{background:var(--surface2);color:var(--cream);border:1px solid var(--border-light)}
.btn-secondary:hover{border-color:var(--gold-dim)}
.save-row{display:flex;gap:8px;margin-top:12px;align-items:flex-end}
.save-row .field{flex:1;margin:0}
.save-row .btn{flex:0 0 auto;padding:9px 16px}
.char-list{display:flex;flex-direction:column;gap:8px}
.char-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.char-card:hover{border-color:var(--gold-dim)}
.char-info h3{font-family:'Cinzel',serif;font-size:14px;color:var(--cream);font-weight:600}
.char-info p{font-size:13px;color:var(--cream-dim);margin-top:2px;font-style:italic}
.char-actions{display:flex;gap:6px}
.char-btn{padding:6px 10px;border-radius:3px;font-size:12px;cursor:pointer;border:1px solid;font-family:'Cinzel',serif;letter-spacing:.5px;transition:all .15s}
.char-btn-load{background:#1a1400;color:var(--gold);border-color:var(--gold-dim)}
.char-btn-del{background:#1a0500;color:#c85040;border-color:#5a1a10}
.empty-state{text-align:center;padding:40px 20px;color:var(--cream-dim);font-style:italic}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--gold);color:#0a0805;padding:10px 20px;border-radius:4px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
.divider{height:1px;background:var(--border);margin:20px 0}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
</style>
</head>
<body>
<a href="index.html" class="back-link">&larr; Volver</a>
<header>
  <h1>Zskahra</h1>
  <p>Generador de imágenes de personaje</p>
</header>
<div class="tabs">
  <button class="tab active" onclick="switchTab('crear')">Crear</button>
  <button class="tab" onclick="switchTab('guardados')">Guardados</button>
</div>
<main>
  <section id="tab-crear" class="active">
    <div class="section-title">Origen</div>
    <div class="race-grid">
      <button class="race-btn active" onclick="setRace('aldeano',this)">Aldeano/a<span class="race-sub">Nacido en las villas</span></button>
      <button class="race-btn" onclick="setRace('mellizo',this)">Mellizo/a<span class="race-sub">Criado en las villas</span></button>
    </div>
    <div id="form-container"></div>
    <div class="divider"></div>
    <div class="prompt-container">
      <div class="prompt-header">
        <span>Prompt generado</span>
        <button class="btn btn-primary" style="flex:0;padding:6px 14px;font-size:11px;" onclick="copyPrompt()">Copiar</button>
      </div>
      <div class="prompt-text" id="prompt-output">Selecciona un origen...</div>
    </div>
    <div class="save-row">
      <div class="field"><label>Nombre</label><input type="text" id="char-name" placeholder="Nombre del personaje..."></div>
      <button class="btn btn-secondary" onclick="saveCharacter()">Guardar</button>
    </div>
  </section>
  <section id="tab-guardados">
    <div class="section-title">Personajes guardados</div>
    <div class="char-list" id="char-list"><div class="empty-state">No hay personajes guardados aún.</div></div>
  </section>
</main>
<div class="toast" id="toast"></div>
<script>
// ── STATE ──────────────────────────────────────────────────
let currentRace = 'aldeano';
let currentData = {};
let randomTraits = { face: '', scar: '', wild: '' };

// ── RANDOM BANKS ───────────────────────────────────────────
const faceBank = [
  'long and narrow face, sharp angular cheekbones',
  'angular face with a prominent square jaw',
  'oval face, high cheekbones, softer jawline',
  'long face with strong aquiline bone structure',
  'narrow face, deep-set eyes, prominent brow ridge',
  'angular face, wide-set eyes, high flat cheekbones',
  'long jaw, slightly asymmetric — left side slightly fuller',
  'fine-boned angular face, almost severe in its precision'
];

const noseBank = [
  'straight and narrow nose',
  'slightly aquiline nose, strong bridge',
  'short straight nose, faintly wide at the tip',
  'long fine nose with a slight downward tip',
  'broad bridge, flat tip',
  'narrow nose with a faint leftward lean — broken once'
];

const browBank = [
  'heavy expressive brows',
  'fine sparse brows, barely there',
  'strong defined brows set low over the eyes',
  'asymmetric brows — the left sits slightly higher',
  'straight thick brows, almost meeting at center',
  'arched brows that give a permanent look of mild inquiry'
];

const profScars = {
  '-ior (caravanero)': [
    'a faded rope burn scar circling the left wrist',
    'a small scar on the chin from an old road fall',
    'a healed split through the right eyebrow',
    'wind-chapped lips, cracked at the left corner — chronic'
  ],
  '-mork (cazador/guerrero)': [
    'a pale scar crossing the left jaw from ear to chin',
    'three parallel old claw marks on the right forearm',
    'a crooked nose, broken once and healed imperfectly',
    'the tip of the left little finger missing — old trap accident'
  ],
  '-ion (sanador)': [
    'a small circular burn on the right palm from an old hot vessel',
    'faint herb-stain discoloration on the inner wrists',
    'unusually clean, careful hands with early calluses on fingertips only',
    'a habit of holding the hands open and relaxed, always'
  ],
  '-val (artesano/tejedor)': [
    'blue-grey dye stains permanently embedded in the knuckles',
    'a rope callus on the right palm, raised and rough',
    'a thin cut scar on the left index finger, old and white',
    'permanently stained fingernails, work that never fully washes off'
  ],
  '-sar (archivista)': [
    'fine lines at the outer corners of the eyes from years of close reading',
    'unusually smooth hands from cord work, no calluses',
    'a faint ink smudge on the right wrist that never fully cleans',
    'a slight habitual tilt of the head to the left when listening'
  ],
  '-veth (religioso)': [
    'a small deliberate ritual scar on the left palm, old and precise',
    'bead-wear marks on the neck where the cords have rested for years',
    'eyes that hold contact a beat longer than comfortable',
    'a quality of absolute stillness in the face at rest'
  ],
  '-held (artefactos)': [
    'a small burn mark on the back of the right hand from an energy discharge',
    'one eyebrow slightly thinner where an old burn healed',
    'faint blue-grey discoloration at the fingertips from contact exposure',
    'a habit of going very still when examining anything small'
  ],
  '-kron (consejo)': [
    'deep lines at the eye corners from decades of decisions made in silence',
    'a long-healed scar on the left forearm, old enough to be pure white',
    'a permanent slight furrow between the brows',
    'hands that move slowly and with absolute deliberateness'
  ],
  '-oth (vidente)': [
    'faint dark circles under both eyes — disrupted sleep, chronic',
    'a habit of looking slightly past whoever is speaking',
    'a small self-inflicted ritual nick on the left earlobe, old',
    'the quality of someone who has been frightened by their own dreams'
  ],
  'aprendiz sin sufijo': [
    'a fresh small cut on the right hand, recently acquired',
    'work residue on the hands not fully scrubbed clean',
    'a slight hesitation before making direct eye contact',
    'the careful posture of someone still learning how much space to take'
  ]
};

const wildBank = [
  'a small dark birthmark just below the left eye',
  'one earlobe slightly torn — an old cord accident',
  'the left eye very slightly paler than the right',
  'unusually heavy brows for an Aldeano — ancestral throwback',
  'a gap between the two front teeth, visible when speaking',
  'a scar through the left eyebrow — hair does not grow there',
  'the left ear sits fractionally higher than the right, giving a subtle asymmetry',
  'hands noticeably large for their frame',
  'a permanent faint upturn at the left corner of the mouth — nerve damage, old',
  'one eye very slightly larger than the other',
  'cheekbones so sharp they cast visible shadow in direct light',
  'a small patch of hair at the left temple that grows in a different direction',
  'the right hand has a slightly longer index finger than the left — asymmetric',
  'a faint old watermark-like discoloration on the right side of the neck, congenital'
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function rollAll(role) {
  const scars = profScars[role] || profScars['aprendiz sin sufijo'];
  randomTraits = {
    face: pick(faceBank) + ', ' + pick(noseBank) + '. ' + pick(browBank) + '.',
    scar: pick(scars),
    wild: pick(wildBank)
  };
  renderTraits();
  updatePrompt();
}

function rollOne(key, role) {
  if (key === 'face') randomTraits.face = pick(faceBank) + ', ' + pick(noseBank) + '. ' + pick(browBank) + '.';
  if (key === 'scar') { const s = profScars[role] || profScars['aprendiz sin sufijo']; randomTraits.scar = pick(s); }
  if (key === 'wild') randomTraits.wild = pick(wildBank);
  renderTraits();
  updatePrompt();
}

function renderTraits() {
  const box = document.getElementById('traits-display');
  if (!box) return;
  box.innerHTML = `
    <div class="trait-row">
      <span class="trait-label">Cara</span>
      <span class="trait-value">${randomTraits.face}</span>
      <button class="reroll-btn" onclick="rollOne('face','${currentData.role||'aprendiz sin sufijo'}')">🎲</button>
    </div>
    <div class="trait-row">
      <span class="trait-label">Marca</span>
      <span class="trait-value">${randomTraits.scar}</span>
      <button class="reroll-btn" onclick="rollOne('scar','${currentData.role||'aprendiz sin sufijo'}')">🎲</button>
    </div>
    <div class="trait-row">
      <span class="trait-label">Distintivo</span>
      <span class="trait-value">${randomTraits.wild}</span>
      <button class="reroll-btn" onclick="rollOne('wild','${currentData.role||'aprendiz sin sufijo'}')">🎲</button>
    </div>
    <button class="reroll-all" onclick="rollAll('${currentData.role||'aprendiz sin sufijo'}')">🎲 Reroll todo</button>
  `;
}

// ── TABS ───────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['crear','guardados'][i]===tab));
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='guardados') renderSaved();
}

function setRace(race, btn) {
  currentRace = race;
  document.querySelectorAll('.race-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderForm();
  updatePrompt();
}

// ── FORMS ──────────────────────────────────────────────────
const profFaceNotes = {
  '-ior (caravanero)': 'Expression of someone who reads distances — habitually assessing what lies ahead.',
  '-mork (cazador/guerrero)': 'Alert expression, jaw set. Eyes that scan rather than rest.',
  '-ion (sanador)': 'Warm and attentive expression — the gaze of someone who reads people the way others read terrain.',
  '-val (artesano/tejedor)': 'Focused, inward quality. A person more comfortable with their hands than their words.',
  '-sar (archivista)': 'Concentrated expression, slight forward lean of the head — the habit of someone always about to ask something.',
  '-veth (religioso)': 'Still and inward. A face that gives away very little at rest.',
  '-held (artefactos)': 'Precise, careful gaze — accustomed to looking at small things. Patient.',
  '-kron (consejo)': 'Weight of authority visible in bearing. A face earned, not aged.',
  '-oth (vidente)': 'Eyes slightly unfocused, tracking something at a different layer of the visible.',
  'aprendiz sin sufijo': 'Attentive, careful. The slight uncertainty of someone still learning what they are.'
};

const roleProps = {
  '-ior (caravanero)': 'Carrying: travel pack on one shoulder, worn leather pouch at hip, folded document tucked into belt. Road-worn sandals.',
  '-mork (cazador/guerrero)': 'Carrying: hunting spear in one hand. Rough feather-and-hide shoulder cape. Small pouch at hip.',
  '-ion (sanador)': 'Carrying: bundle of fresh medicinal herbs in one hand. Wide belt with small herb pouches. Small cloth folded over forearm.',
  '-val (artesano/tejedor)': 'Carrying: rope coils at hip, small tool in hand. Stained fingers from work.',
  '-sar (archivista)': 'Carrying: multiple bundles of knotted cords at belt, one held loosely and read by touch.',
  '-veth (religioso)': 'Carrying: ritual staff. Many bead strands at neck. Raw linen band on left wrist with a specific knot.',
  '-held (artefactos)': 'Carrying: two or three small precision metal tools held carefully. Cleaning cloth in other hand.',
  '-kron (consejo)': 'Nothing in hand. Simple but well-kept garments. Deliberate posture of authority.',
  '-oth (vidente)': 'Carrying: small shallow ritual bowl in one hand. Knotted cord bundles at belt. Other hand raised slightly, palm open.',
  'aprendiz sin sufijo': 'Simple tools for the trade being learned. Attentive apprentice posture.'
};

function getAldFormHTML() {
  return `
    <div class="section-title">Identidad</div>
    <div class="form-grid">
      <div class="field"><label>Género</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-field="gender" data-val="male" onclick="setToggle(this)">Hombre</button>
          <button class="toggle-btn" data-field="gender" data-val="female" onclick="setToggle(this)">Mujer</button>
        </div>
      </div>
      <div class="field"><label>Edad</label>
        <select onchange="setVal('age',this.value)">
          <option value="young adult (~18)">Joven adulto (~18)</option>
          <option value="young adult (~20)">Joven adulto (~20)</option>
          <option value="adult (~30)" selected>Adulto (~30)</option>
          <option value="mature adult (~45)">Adulto maduro (~45)</option>
          <option value="elder (~60)">Anciano (~60)</option>
        </select>
      </div>
      <div class="field"><label>Villa de origen</label>
        <select onchange="setVal('village',this.value)">
          <option>Ksilnar</option><option>Theriv</option><option>Karven</option>
          <option>Logven</option><option>Litor</option><option>Kalvek</option>
          <option>Hisven</option><option>Poymel</option><option>Sitesh</option>
          <option>Halvar</option><option>Ikhmar</option><option>Ydral</option>
        </select>
      </div>
      <div class="field"><label>Oficio / Sufijo</label>
        <select onchange="onRoleChange(this.value)">
          <option value="-ior (caravanero)">-ior · caravanero</option>
          <option value="-mork (cazador/guerrero)">-mork · cazador/guerrero</option>
          <option value="-ion (sanador)" selected>-ion · sanador</option>
          <option value="-val (artesano/tejedor)">-val · artesano/tejedor</option>
          <option value="-sar (archivista)">-sar · archivista</option>
          <option value="-veth (religioso)">-veth · religioso</option>
          <option value="-held (artefactos)">-held · artefactos</option>
          <option value="-kron (consejo)">-kron · consejo</option>
          <option value="-oth (vidente)">-oth · vidente</option>
          <option value="aprendiz sin sufijo">Aprendiz (sin sufijo)</option>
        </select>
      </div>
    </div>
    <div class="section-title">Apariencia</div>
    <div class="form-grid">
      <div class="field"><label>Color de pelo</label>
        <select onchange="setVal('hair_color',this.value)">
          <option value="platinum blonde">Rubio platino</option>
          <option value="ash blonde" selected>Rubio ceniza</option>
          <option value="light brown">Castaño claro</option>
          <option value="medium brown">Castaño medio</option>
          <option value="dark brown">Castaño oscuro</option>
          <option value="auburn">Pelirrojo (raro)</option>
        </select>
      </div>
      <div class="field"><label>Largo de pelo</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-field="hair_length" data-val="cropped" onclick="setToggle(this)">Corto</button>
          <button class="toggle-btn active" data-field="hair_length" data-val="shoulder-length" onclick="setToggle(this)">Medio</button>
          <button class="toggle-btn" data-field="hair_length" data-val="long" onclick="setToggle(this)">Largo</button>
        </div>
      </div>
      <div class="field"><label>Estilo de pelo</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-field="hair_style" data-val="loose" onclick="setToggle(this)">Suelto</button>
          <button class="toggle-btn active" data-field="hair_style" data-val="tied back with cord" onclick="setToggle(this)">Recogido</button>
          <button class="toggle-btn" data-field="hair_style" data-val="braided" onclick="setToggle(this)">Trenzado</button>
        </div>
      </div>
      <div class="field"><label>Color de ojos</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-field="eyes" data-val="pale grey" onclick="setToggle(this)">Gris</button>
          <button class="toggle-btn" data-field="eyes" data-val="pale blue" onclick="setToggle(this)">Azul</button>
          <button class="toggle-btn" data-field="eyes" data-val="green" onclick="setToggle(this)">Verde</button>
          <button class="toggle-btn" data-field="eyes" data-val="blue-grey" onclick="setToggle(this)">Azul-gris</button>
        </div>
      </div>
      <div class="field"><label>Tono de piel</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-field="skin_scale" data-val="1" onclick="setToggle(this)">Muy claro</button>
          <button class="toggle-btn" data-field="skin_scale" data-val="2" onclick="setToggle(this)">Claro</button>
        </div>
      </div>
    </div>
    <div class="section-title">Rasgos únicos <span style="font-size:10px;color:var(--cream-dim);font-family:'Crimson Text',serif;text-transform:none;letter-spacing:0;font-style:italic;margin-left:6px">generados automáticamente — re-rolleable</span></div>
    <div class="traits-box" id="traits-display">Cargando...</div>
    <div class="section-title">Escena</div>
    <div class="form-grid">
      <div class="field"><label>Contexto</label>
        <select onchange="setVal('background',this.value)">
          <option value="interior of the village, stone buildings in background">Interior de villa</option>
          <option value="edge of the village at dusk, forest visible beyond">Borde de villa al anochecer</option>
          <option value="open road between villages, dry grassland">Ruta entre villas</option>
          <option value="forest edge, treeline ahead">Borde del bosque</option>
          <option value="beside a stone village pilón, late afternoon light">Junto a un pilón</option>
          <option value="riverbank, water visible behind">Orilla del río</option>

      <div class="field"><label>Notas adicionales (opcional)</label>
        <textarea placeholder="Detalles extra, historia, sobreescribir rasgos..." onchange="setVal('notes',this.value)" oninput="setVal('notes',this.value)"></textarea>
      </div>
    </div>
  `;
}

function getMellizoFormHTML() {
  return `
    <div class="section-title">Personaje</div>
    <div class="form-grid">
      <div class="field"><label>¿Cuál mellizo?</label>
        <div class="toggle-group">
          <button class="toggle-btn active" data-field="twin" data-val="female" onclick="setToggle(this)">Ella</button>
          <button class="toggle-btn" data-field="twin" data-val="male" onclick="setToggle(this)">Él</button>
        </div>
      </div>
      <div class="field"><label>Edad</label>
        <div class="toggle-group">
          <button class="toggle-btn" data-field="age" data-val="~16" onclick="setToggle(this)">~16</button>
          <button class="toggle-btn active" data-field="age" data-val="~18" onclick="setToggle(this)">~18</button>
          <button class="toggle-btn" data-field="age" data-val="~20" onclick="setToggle(this)">~20</button>
        </div>
      </div>
    </div>
    <div class="section-title">Rasgos únicos <span style="font-size:10px;color:var(--cream-dim);font-family:'Crimson Text',serif;text-transform:none;letter-spacing:0;font-style:italic;margin-left:6px">generados automáticamente</span></div>
    <div class="traits-box" id="traits-display">Cargando...</div>
    <div class="section-title">Escena</div>
    <div class="form-grid">
      <div class="field"><label>Contexto</label>
        <select onchange="setVal('context',this.value)">
          <option value="medicinal herb garden at the edge of the village, late morning">Jardín medicinal (ella)</option>
          <option value="beside a village pilón at late dusk">Junto al pilón al anochecer (él)</option>
          <option value="inside the village, slightly apart from the crowd">Interior de villa, apartado</option>
          <option value="at the edge of the village, looking toward the forest">Borde de villa, mirando al bosque</option>
        </select>
      </div>
      <div class="field"><label>Notas adicionales (opcional)</label>

  `;
}

function renderForm() {
  const c = document.getElementById('form-container');
  c.innerHTML = currentRace === 'aldeano' ? getAldFormHTML() : getMellizoFormHTML();
  currentData = {};
  c.querySelectorAll('.toggle-btn.active').forEach(b => { currentData[b.dataset.field] = b.dataset.val; });
  c.querySelectorAll('select').forEach(s => {
    const m = s.getAttribute('onchange')?.match(/'([^']+)'/);
    if (m) currentData[m[1]] = s.value;
  });
  if (currentRace === 'aldeano') currentData.role = '-ion (sanador)';
  const role = currentData.role || 'aprendiz sin sufijo';
  rollAll(role);
}

function onRoleChange(val) {
  currentData.role = val;
  rollAll(val);
  updatePrompt();
}

function setToggle(btn) {
  const f = btn.dataset.field;
  btn.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentData[f] = btn.dataset.val;
  updatePrompt();
}

function setVal(f, v) { currentData[f] = v; updatePrompt(); }

// ── PROMPT BUILDERS ────────────────────────────────────────
function buildAldeano(d) {
  const h = d.gender === 'female' ? '1.85–2.00m' : '1.95–2.10m';
  const beard = d.gender === 'male' ? ' No beard or very light stubble.' : '';
  const skin = d.skin_scale === '2'
    ? 'skin tone scale 2 out of 10 — very light grey tint, barely perceptible, still nearly white.'
    : 'skin tone scale 1 out of 10 — near-white, minimal hatching, almost no shadow on skin surface.';
  const faceNote = profFaceNotes[d.role] || '';
  const props = roleProps[d.role] || 'Simple draped linen garments, earth tones.';

  return `Full-body illustration, antique manuscript style, sepia ink line drawing on aged parchment, detailed hatching, no color except warm yellowed paper background.
NO TEXT, NO LABELS, NO WRITING anywhere.

Subject: a ${d.age} ${d.gender === 'male' ? 'man' : 'woman'}, Aldeano from ${d.village || 'a village'}, role: ${d.role}.
Extraordinarily tall and lean (~${h}), limbs disproportionately long, very low body weight for height. NOT muscular. Built for agility.

Face: ${randomTraits.face}${beard}
${faceNote}

Hair: ${d.hair_color}, ${d.hair_length}, ${d.hair_style}.
Eyes: ${d.eyes}.

Skin: ${skin}

Distinctive physical detail: ${randomTraits.scar}.
Unique trait: ${randomTraits.wild}.

${props}

Simple draped linen garments, layered, earth tones. Cord-laced sandals.${d.notes ? '\n\nAdditional notes: ' + d.notes : ''}

Background: ${d.background || 'interior of the village'}.`;
}

function buildMellizo(d) {
  const isFemale = d.twin === 'female';
  const wild = `Distinctive detail: ${randomTraits.wild}.`;
  if (isFemale) {
    return `Full-body illustration, antique manuscript style, sepia ink line drawing on aged parchment, detailed hatching, no color except warm yellowed paper background.
NO TEXT, NO LABELS, NO WRITING anywhere.

Subject: a young woman, approximately ${d.age || '~18'} years old, raised in an Aldeano village.
1.75m tall — visibly shorter and more solidly built than any Aldeano. Wide-shouldered, compact, muscular density visible. Stocky compared to the tall willowy Aldeano physique.

Skin: skin tone medium grey, scale 6 out of 10 where 1=white 10=black. Noticeably darker than any Aldeano. No marks on skin.

Face: strikingly beautiful, strong symmetry. High prominent cheekbones, defined jaw. Full lips, slightly broad nose. Deep-set dark grey eyes — warm and attentive.
${wild}

Hair: dark brown, almost black. Long, loosely braided. A few small dried herb stems tucked in.

Around neck: a small amulet on a cord — old, worn smooth. Not touching it consciously.

Clothing: simple Aldeano linen wrap, earth tones. Wide belt with small herb pouches. Cord-laced sandals.
Carrying: bundle of fresh medicinal herbs in one hand. Small cloth folded over forearm.${d.notes ? '\n\nAdditional notes: ' + d.notes : ''}

Background: ${d.context || 'medicinal herb garden at the edge of the village'}.`;
  }
  return `Full-body illustration, antique manuscript style, sepia ink line drawing on aged parchment, detailed hatching, no color except warm yellowed paper background.
NO TEXT, NO LABELS, NO WRITING anywhere.

Subject: a young man, approximately ${d.age || '~18'} years old, raised in an Aldeano village.
1.82m tall — visibly shorter and more solidly built than any Aldeano. Wide-shouldered, compact, muscular density visible.

Skin: skin tone medium grey, scale 6 out of 10 where 1=white 10=black. Noticeably darker than any Aldeano. No marks on skin.

Face: strong symmetry, high prominent cheekbones. Angular jaw. Dark grey eyes, wide-set, expression still and inward.
${wild}

Hair: dark, tight curls, close-cropped at sides, slightly longer on top.

Around neck: a small amulet on a cord — old, worn smooth. Identical to one his sister carries.

Clothing: simple Aldeano linen wrap, white-cream tones. Belt with small pouch and knotted cord bundles. Cord-laced sandals.
Carrying: small shallow ritual bowl in one hand. Other arm raised slightly, palm open upward.${d.notes ? '\n\nAdditional notes: ' + d.notes : ''}

Background: ${d.context || 'beside a village pilón at late dusk'}.`;
}

function updatePrompt() {
  let p = '';
  try {
    if (currentRace === 'aldeano') p = buildAldeano(currentData);
    else p = buildMellizo(currentData);
  } catch(e) { p = 'Error generando prompt.'; }
  document.getElementById('prompt-output').textContent = p;
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('prompt-output').textContent)
    .then(() => showToast('Prompt copiado'));
}

// ── SAVE / LOAD ────────────────────────────────────────────
async function saveCharacter() {
  const name = document.getElementById('char-name').value.trim();
  if (!name) { showToast('Escribe un nombre primero'); return; }
  const char = {
    id: Date.now().toString(), name,
    race: currentRace,
    data: { ...currentData },
    traits: { ...randomTraits },
    saved: new Date().toLocaleDateString('es')
  };
  let chars = [];
  try { const r = await window.storage.get('zskahra-player-chars'); if (r) chars = JSON.parse(r.value); } catch(e) {}
  chars.unshift(char);
  await window.storage.set('zskahra-player-chars', JSON.stringify(chars));
  document.getElementById('char-name').value = '';
  showToast(`"${name}" guardado`);
}

async function renderSaved() {
  const list = document.getElementById('char-list');
  let chars = [];
  try { const r = await window.storage.get('zskahra-player-chars'); if (r) chars = JSON.parse(r.value); } catch(e) {}
  if (!chars.length) { list.innerHTML = '<div class="empty-state">No hay personajes guardados aún.</div>'; return; }
  list.innerHTML = chars.map(c => `
    <div class="char-card">
      <div class="char-info"><h3>${c.name}</h3><p>${c.race === 'aldeano' ? 'Aldeano/a' : 'Mellizo/a'} · ${c.saved || ''}</p></div>
      <div class="char-actions">
        <button class="char-btn char-btn-load" onclick="loadChar('${c.id}')">Cargar</button>
        <button class="char-btn char-btn-del" onclick="deleteChar('${c.id}')">✕</button>
      </div>
    </div>`).join('');
}

async function loadChar(id) {
  let chars = [];
  try { const r = await window.storage.get('zskahra-player-chars'); if (r) chars = JSON.parse(r.value); } catch(e) {}
  const char = chars.find(c => c.id === id);
  if (!char) return;
  switchTab('crear');
  currentRace = char.race;
  document.querySelectorAll('.race-btn').forEach((b, i) => b.classList.toggle('active', ['aldeano','mellizo'][i] === char.race));
  currentData = { ...char.data };
  if (char.traits) randomTraits = { ...char.traits };
  renderForm();
  setTimeout(() => {
    document.querySelectorAll('.toggle-btn').forEach(b => {
      if (b.dataset.field && currentData[b.dataset.field] === b.dataset.val) {
        b.closest('.toggle-group').querySelectorAll('.toggle-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      }
    });
    document.querySelectorAll('select').forEach(s => {
      const m = s.getAttribute('onchange')?.match(/'([^']+)'/);
      if (m && currentData[m[1]]) s.value = currentData[m[1]];
    });
    if (char.traits) { randomTraits = { ...char.traits }; renderTraits(); }
    updatePrompt();
  }, 60);
  document.getElementById('char-name').value = char.name;
  showToast(`"${char.name}" cargado`);
}

async function deleteChar(id) {
  let chars = [];
  try { const r = await window.storage.get('zskahra-player-chars'); if (r) chars = JSON.parse(r.value); } catch(e) {}
  chars = chars.filter(c => c.id !== id);
  await window.storage.set('zskahra-player-chars', JSON.stringify(chars));
  renderSaved();
  showToast('Personaje eliminado');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── INIT ───────────────────────────────────────────────────
renderForm();
</script>
